name: Veille concurrentielle (BLOC 1)

# Tourne tous les jours et détecte les nouveaux produits des concurrents
# (concurrents.txt). Met à jour data/vus.json (mémoire) + data/nouveaux.json
# et les committe pour persister entre les runs.
#
# ⚠ BLOC 1 uniquement : aucune création produit / image / ad ici (pas de MCP).
#   Le traitement (BLOC 2-3) se fait en session Claude avec les connecteurs.

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC tous les jours (~07:00 Paris été / 06:00 hiver)
  workflow_dispatch: {}    # bouton "Run workflow" pour lancer à la main

permissions:
  contents: write          # pour committer vus.json / nouveaux.json

concurrency:
  group: veille
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run veille
        run: python -m veille.run

      - name: Commit résultats
        run: |
          git config user.name "veille-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/vus.json data/nouveaux.json
          if git diff --staged --quiet; then
            echo "Rien de neuf (vus.json/nouveaux.json inchangés)."
          else
            git commit -m "veille: maj $(date -u +%F)"
            git push
          fi

      - name: Résumé
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open('data/nouveaux.json'))
          n = d.get('nb_nouveaux', 0)
          print(f"## Veille du jour")
          print(f"- Concurrents : {', '.join(d.get('concurrents_traites', []))}")
          print(f"- Scrapés (≥ plancher) : {d.get('nb_total_scrape', 0)}")
          print(f"- **NOUVEAUX produits : {n}**")
          if n:
              print("\n| Titre | Prix |")
              print("|---|---|")
              for p in d.get('produits', [])[:30]:
                  t = (p.get('titre_source') or p.get('handle') or '?')[:60]
                  pr = (p.get('prix_source') or {}).get('montant', '?')
                  print(f"| {t} | {pr} |")
          PY
